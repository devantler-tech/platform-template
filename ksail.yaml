# Local Talos + Docker development cluster.
# See docs/TEMPLATING.md for the fields a fork of this repo needs to edit.
---
apiVersion: ksail.io/v1alpha1
kind: Cluster
metadata:
  name: local
spec:
  cluster:
    distributionConfig: talos-local
    connection:
      context: admin@local
      timeout: 40m
    distribution: Talos
    provider: Docker
    cni: Cilium
    csi: Enabled
    gitOpsEngine: Flux
    certManager: Enabled
    metricsServer: Enabled
    policyEngine: Kyverno
    controlPlanes: 1
    workers: 3
    talos:
      extraPortMappings:
        - containerPort: 80
          hostPort: 80
        - containerPort: 443
          hostPort: 443
  workload:
    sourceDirectory: k8s
    kustomizationFile: clusters/local

