# Prod Talos + Hetzner cluster.
# See docs/TEMPLATING.md for the fields a fork of this repo needs to edit.
---
apiVersion: ksail.io/v1alpha1
kind: Cluster
metadata:
  name: prod
spec:
  cluster:
    distributionConfig: talos
    connection:
      context: admin@prod
      timeout: 30m
    distribution: Talos
    provider: Hetzner
    cni: Cilium
    gitOpsEngine: Flux
    # KSail manages the Cluster Autoscaler natively when
    # autoscaler.node.enabled is set. KSail installs, configures, and
    # reconciles the autoscaler — no Flux manifests needed. Initial
    # static node counts still apply on `cluster create`.
    autoscaler:
      node:
        enabled: true
        expander: LeastWaste
        maxNodesTotal: 10
        scaleDownUnneededTime: "10m"
        pools:
          - name: autoscale-small
            serverType: cx23
            location: fsn1
            min: 0
            max: 1
          - name: autoscale-medium
            serverType: cx33
            location: fsn1
            min: 0
            max: 2
    # These components are installed by ksail. There is a known race on
    # Hetzner clusters between ksail's metrics-server install and Flux's
    # kubelet-serving-cert-approver install (required because Talos
    # rotate-server-certificates: true leaves kubelet serving CSRs
    # pending). File upstream in devantler-tech/ksail if this trips
    # bootstrap again.
    certManager: Enabled
    metricsServer: Enabled
    policyEngine: Kyverno
    controlPlanes: 3
    # Baseline workers — guaranteed minimum even if autoscaler is down.
    # Longhorn requires dedicated Hetzner Cloud Volumes on static
    # workers; autoscaler-created nodes are compute-only.
    # The Cluster Autoscaler manages additional workers dynamically.
    # Restored to 4 — unblocked by the kubernetesVersion pin below and the KSail >= 7.23.4 scale-up fix.
    workers: 4
    # Pin Kubernetes to the version the cluster already runs so
    # 'ksail cluster update' doesn't roll nodes to ksail's newer default
    # (currently 1.36.0), which Talos v1.12.4 rejects with
    # "kubelet image is not valid: version of Kubernetes ... is too new".
    # Talos v1.12.4 supports Kubernetes up to 1.35.x; bump this deliberately
    # in lockstep with the Talos version rather than letting the default drift.
    kubernetesVersion: v1.32.0
    talos:
      # Pin Talos to match the ISO so 'ksail cluster update' doesn't attempt
      # an unwanted in-place upgrade to ksail's default version.
      version: v1.12.4
      # Hetzner Talos ISO (x86_64). The v1.11.2 ISO (122630) was deprecated
      # and removed from Hetzner on 2026-03-18. Use v1.12.4 (125127).
      iso: 125127
      # Talos Image Factory extensions baked into the node image. KSail
      # computes the schematic ID from this list and uses it both for
      # machine.install.image and for the Hetzner snapshot the Cluster
      # Autoscaler boots new nodes from. Must match the schematic in
      # talos/cluster/install-image.yaml.
      #   - siderolabs/iscsi-tools      (Longhorn data plane)
      #   - siderolabs/util-linux-tools (Longhorn fstrim)
      #   - siderolabs/qemu-guest-agent (Hetzner Cloud VM integration)
      extensions:
        - siderolabs/iscsi-tools
        - siderolabs/util-linux-tools
        - siderolabs/qemu-guest-agent
    localRegistry:
      registry: "REPLACE_OWNER:${GHCR_TOKEN}@ghcr.io/REPLACE_OWNER/REPLACE_REPO/manifests"
  provider:
    hetzner:
      controlPlaneServerType: cx33
      workerServerType: cx33
      location: fsn1
      networkCidr: 10.0.0.0/16
      placementGroupStrategy: Spread
      fallbackLocations:
        - nbg1
        - hel1
      placementGroupFallbackToNone: true
  workload:
    sourceDirectory: k8s
    kustomizationFile: clusters/prod
    tag: latest
