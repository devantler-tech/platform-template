---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: infrastructure-controllers
  namespace: flux-system
spec:
  interval: 60m
  timeout: 3m
  retryInterval: 2m
  path: providers/__PROVIDER__/infrastructure/controllers
  sourceRef:
    kind: OCIRepository
    name: flux-system
  dependsOn:
    # The bootstrap layer applies cluster PriorityClasses (e.g. platform-critical)
    # and substitution variables; it must be ready before these controllers
    # reconcile, since e.g. kube-prometheus-stack references platform-critical and
    # helm-controller would otherwise roll its pods before the class exists.
    - name: bootstrap
  decryption:
    provider: sops
    secretRef:
      name: sops-age
  postBuild:
    substituteFrom:
      # Per-Flux docs, later entries override earlier ones, so the base
      # (defaults) come first and the per-cluster overrides come last.
      - kind: ConfigMap
        name: variables-base
      - kind: Secret
        name: variables-base
      - kind: ConfigMap
        name: variables-cluster
      - kind: Secret
        name: variables-cluster
  wait: true
  prune: true
  force: true
