---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base

# Template inputs for this cluster. cluster-meta drives the replacements
# below; it is annotated local-config and never applied to the cluster.
patches:
  - patch: |
      apiVersion: v1
      kind: ConfigMap
      metadata:
        name: cluster-meta
        namespace: flux-system
      data:
        cluster_name: local
        provider: docker
  # Docker CI has slower startup for apps due to cold image cache.
  # Override the base apps timeout to allow more time for health checks.
  - patch: |
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: apps
        namespace: flux-system
      spec:
        timeout: 20m
  # Docker CI has slower image pulls on cold runners. Increase the
  # infrastructure-controllers health-check timeout so VPA (5m default timeout)
  # and keda-http-add-on (10m timeout) can complete before the health check
  # fires, reducing the retry storm that can temporarily overload the API server.
  - patch: |
      apiVersion: kustomize.toolkit.fluxcd.io/v1
      kind: Kustomization
      metadata:
        name: infrastructure-controllers
        namespace: flux-system
      spec:
        timeout: 12m

replacements:
  # Point apps / infrastructure / infrastructure-controllers Flux Kustomizations
  # at the provider directory for this cluster.
  - source:
      kind: ConfigMap
      name: cluster-meta
      fieldPath: data.provider
    targets:
      - select:
          kind: Kustomization
          namespace: flux-system
        reject:
          # bootstrap uses a __CLUSTER__ path (rewritten by cluster_name below),
          # not a __PROVIDER__ path, so exclude it from the provider rewrite.
          - name: bootstrap
        fieldPaths:
          - spec.path
        options:
          delimiter: "/"
          index: 1
  # Point the bootstrap Flux Kustomization at this cluster's bootstrap directory.
  - source:
      kind: ConfigMap
      name: cluster-meta
      fieldPath: data.cluster_name
    targets:
      - select:
          kind: Kustomization
          namespace: flux-system
          name: bootstrap
        fieldPaths:
          - spec.path
        options:
          delimiter: "/"
          index: 1
