apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-homepage
  namespace: homepage
spec:
  endpointSelector: {}
  ingress:
    # Traffic from oauth2-proxy (via gateway → oauth2-proxy → homepage)
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: oauth2-proxy
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
    # Intra-namespace (Helm test pods)
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: homepage
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
  egress:
    # Kube API for widget data
    - toEntities:
        - kube-apiserver
    # Intra-namespace (Helm test pods reaching homepage service)
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: homepage
      toPorts:
        - ports:
            - port: "3000"
              protocol: TCP
    # DNS resolution
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
