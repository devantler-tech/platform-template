---
apiVersion: http.keda.sh/v1alpha1
kind: HTTPScaledObject
metadata:
  name: headlamp
  namespace: headlamp
spec:
  hosts:
    - headlamp.${domain}
  scaleTargetRef:
    name: headlamp
    service: headlamp
    port: 80
  replicas:
    min: 0
    max: 1 # OIDC login stores state in-memory per pod; limit to 1 so the callback always lands on the same pod.
  scaledownPeriod: 300
  scalingMetric:
    requestRate:
      granularity: 1s
      targetValue: 100
      window: 1m
