apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-vpa
  namespace: vertical-pod-autoscaler
spec:
  endpointSelector: {}
  ingress:
    # Webhook from kube-apiserver (hostNetwork on control plane nodes)
    - fromEntities:
        - kube-apiserver
        - remote-node
        - host
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP
  egress:
    # Kube API for managing VPAs
    - toEntities:
        - kube-apiserver
    # Metrics server (recommender queries resource metrics)
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
            - port: "10250"
              protocol: TCP
    # DNS resolution
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
