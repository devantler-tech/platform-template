---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-operator
  namespace: flux-system
  labels:
    helm.toolkit.fluxcd.io/crds: enabled
    helm.toolkit.fluxcd.io/helm-test: enabled
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  chart:
    spec:
      chart: flux-operator
      version: 0.48.0
      sourceRef:
        kind: HelmRepository
        name: flux-operator
  interval: 10m0s
  timeout: 10m
  install:
    remediation:
      retries: -1
  upgrade:
    remediation:
      retries: -1
      remediateLastFailure: true
  values:
    web:
      config:
        baseURL: https://flux.${domain}
        authentication:
          type: OAuth2
          oauth2:
            provider: OIDC
            clientID: flux-web
            clientSecret: ${flux_web_client_secret}
            issuerURL: https://dex.${domain}
            scopes:
              - openid
              - profile
              - email
              - groups
              - offline_access
            impersonation:
              username: "claims.email"
              groups: "has(claims.groups) ? claims.groups : []"
      rbac:
        createRoles: true
