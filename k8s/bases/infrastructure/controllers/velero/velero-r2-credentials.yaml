---
# Placeholder secret so the Velero HelmRelease can start before the
# ExternalSecret controller creates the real credentials.  Velero's chart
# mounts `existingSecret` as a required volume — if the Secret does not
# exist the pod stays Pending, creating a bootstrap deadlock:
#
#   infrastructure-controllers (Velero) → needs Secret
#   infrastructure (ExternalSecret)     → depends on infrastructure-controllers
#
# This empty stub breaks the cycle.  Once the ExternalSecret in the
# `infrastructure` Flux Kustomization reconciles, it overwrites this
# Secret with the real R2 credentials (creationPolicy: Owner).
apiVersion: v1
kind: Secret
metadata:
  name: velero-r2-credentials
  namespace: velero
type: Opaque
stringData:
  cloud: |
    [default]
    aws_access_key_id=PLACEHOLDER
    aws_secret_access_key=PLACEHOLDER
