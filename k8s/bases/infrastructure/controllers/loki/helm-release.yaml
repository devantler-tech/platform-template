apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
  namespace: monitoring
  labels:
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  # ServiceMonitor (monitoring.serviceMonitor) needs the Prometheus
  # operator CRDs, and Loki shares the monitoring namespace with it.
  dependsOn:
    - name: kube-prometheus-stack
      namespace: monitoring
  interval: 5m
  timeout: 10m
  install:
    remediation:
      retries: -1
  upgrade:
    remediation:
      retries: -1
      remediateLastFailure: true
  chart:
    spec:
      chart: loki
      version: 7.0.0
      sourceRef:
        kind: HelmRepository
        name: grafana
  # https://github.com/grafana/loki/blob/main/production/helm/loki/values.yaml
  #
  # Single-binary Loki: the smallest production-viable topology. No object
  # store, caches, gateway, or canary -- logs land on a local volume with
  # 7-day retention, which is plenty for post-incident debugging at this
  # scale. The base attaches a small 5Gi PVC against the cluster's
  # default storage class (a Loki-chart quirk: `persistence.enabled: false`
  # leaves /var/loki unmounted and the container crashes against the
  # default read-only root). On docker/CI that resolves to local-path,
  # which behaves like a host directory and is recycled with the cluster;
  # the hetzner overlay overrides this to a 10Gi hcloud block volume that
  # Velero's daily monitoring-namespace backup ships to R2. Grafana
  # queries Loki as a datasource and Alloy ships pod logs into it.
  values:
    deploymentMode: SingleBinary
    loki:
      auth_enabled: false
      commonConfig:
        replication_factor: 1
      storage:
        type: filesystem
      schemaConfig:
        configs:
          - from: "2024-04-01"
            store: tsdb
            object_store: filesystem
            schema: v13
            index:
              prefix: index_
              period: 24h
      limits_config:
        retention_period: 168h
        volume_enabled: true
      compactor:
        retention_enabled: true
        delete_request_store: filesystem
    singleBinary:
      replicas: 1
      persistence:
        # The chart's `persistence.enabled: false` means no volume at /var/loki
        # at all (not an emptyDir) and Loki crashes writing chunks under the
        # default read-only root filesystem. Use a small PVC against the
        # cluster's default storage class instead -- local-path on the docker
        # provider, overridden to hcloud / 10Gi by the hetzner overlay.
        enabled: true
        size: 5Gi
      resources:
        requests:
          cpu: 50m
          # 128Mi -> 256Mi: shipping the kube-apiserver audit log to Loki
          # (#1696) raised steady-state ingest; VPA now recommends ~728Mi.
          # A warmer floor covers cold start before VPA's Initial-mode
          # recommendation re-applies on pod (re)creation.
          memory: 256Mi
        limits:
          # 512Mi -> 1Gi: the old cap sat below the VPA target (~728Mi), so
          # VPA (controlledValues: RequestsOnly) could not raise the request
          # past the limit and Loki was OOMKilled. 1Gi clears the target with
          # headroom for further audit-log ingest growth.
          memory: 1Gi
    # Single-binary mode only -- zero out the scalable-topology targets.
    backend:
      replicas: 0
    read:
      replicas: 0
    write:
      replicas: 0
    # Trim everything optional to keep the footprint small.
    chunksCache:
      enabled: false
    resultsCache:
      enabled: false
    lokiCanary:
      enabled: false
    test:
      enabled: false
    gateway:
      enabled: false
    monitoring:
      selfMonitoring:
        enabled: false
        grafanaAgent:
          installOperator: false
      serviceMonitor:
        enabled: true
