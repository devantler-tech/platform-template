apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: alloy
  namespace: monitoring
  labels:
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  # Needs Loki's push endpoint and shares the grafana HelmRepository +
  # monitoring namespace defined by the loki release.
  dependsOn:
    - name: loki
      namespace: monitoring
  interval: 5m
  timeout: 10m
  install:
    remediation:
      retries: -1
  upgrade:
    remediation:
      retries: -1
      remediateLastFailure: true
  chart:
    spec:
      chart: alloy
      version: 1.8.2
      # Reuses the `grafana` HelmRepository defined in the loki/ controller
      # directory (same namespace). Both Loki and Alloy come from
      # https://grafana.github.io/helm-charts, and Flux dedups source
      # polling per-HelmRepository, so a single shared source is the
      # intended pattern -- defining a second `grafana` HelmRepository
      # here would be a kustomize duplicate-resource error, and using a
      # differently-named one would just double the chart-index polling
      # against the same URL.
      sourceRef:
        kind: HelmRepository
        name: grafana
  # https://github.com/grafana/alloy/blob/main/operations/helm/charts/alloy/values.yaml
  #
  # Log shipper for the cluster: a DaemonSet that tails pod logs via the
  # Kubernetes API and pushes them to Loki. Discovery is filtered to the
  # node the pod runs on (spec.nodeName == $NODE_NAME) so each DaemonSet
  # replica only ships its own node's logs -- otherwise every replica
  # would tail every pod and N-plicate the logs. Uses the API (not
  # hostPath), so no privileged mounts are needed; the chart's default
  # RBAC already grants pods/log.
  values:
    controller:
      type: daemonset
    alloy:
      # Pure log forwarding -- no clustering needed.
      clustering:
        enabled: false
      extraEnv:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
      resources:
        requests:
          cpu: 25m
          memory: 96Mi
        limits:
          memory: 256Mi
      configMap:
        content: |
          discovery.kubernetes "pods" {
            role = "pod"
            selectors {
              role  = "pod"
              field = "spec.nodeName=" + sys.env("NODE_NAME")
            }
          }

          discovery.relabel "pod_logs" {
            targets = discovery.kubernetes.pods.targets
            rule {
              source_labels = ["__meta_kubernetes_namespace"]
              target_label  = "namespace"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_name"]
              target_label  = "pod"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_container_name"]
              target_label  = "container"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_node_name"]
              target_label  = "node"
            }
            rule {
              source_labels = ["__meta_kubernetes_pod_label_app_kubernetes_io_name"]
              target_label  = "app"
            }
          }

          loki.source.kubernetes "pods" {
            targets    = discovery.relabel.pod_logs.output
            forward_to = [loki.write.default.receiver]
          }

          loki.write "default" {
            endpoint {
              url = "http://loki.monitoring.svc.cluster.local:3100/loki/api/v1/push"
            }
          }
    serviceMonitor:
      enabled: true
