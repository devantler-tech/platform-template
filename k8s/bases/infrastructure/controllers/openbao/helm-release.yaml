apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openbao
  namespace: openbao
  labels:
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 2m
  timeout: 10m
  install:
    remediation:
      retries: -1
  upgrade:
    remediation:
      retries: -1
      remediateLastFailure: true
  chart:
    spec:
      chart: openbao
      version: 0.28.3
      sourceRef:
        kind: HelmRepository
        name: openbao
  # https://github.com/openbao/openbao-helm/blob/main/values.yaml
  values:
    server:
      enabled: true
      replicas: ${openbao_replicas:=1}
      # The chart's default readinessProbe is `exec: bao status`, which
      # returns exit code 2 on a sealed server -- so the Pod stays NotReady
      # until something unseals it. On a fresh cluster that "something" is
      # the vault-config Job in the downstream `infrastructure` Flux layer,
      # which can't run until this HelmRelease (in `infrastructure-controllers`)
      # is Ready. The install therefore deadlocks: Helm waits up to `timeout`,
      # `install.remediation.retries: -1` uninstalls + reinstalls, repeat --
      # cold-cluster bootstrap historically took 20-40 min waiting for that
      # race to resolve (see vault-config Job comment + PR #1636 system-test
      # failure).
      #
      # Switching to the HTTP health probe with `sealedcode=204` and
      # `uninitcode=204` makes a sealed-but-running server Ready immediately.
      # The chart template renders the httpGet branch as soon as `path` is
      # set (server-statefulset.yaml: `{{- if .Values.server.readinessProbe.path }}`)
      # and `openbao.scheme` returns "http" when `global.tlsDisable: true`
      # (chart default; matches the `tls_disable = 1` listener below).
      # The HashiCorp Vault chart uses the same pattern for the same reason.
      readinessProbe:
        path: "/v1/sys/health?standbyok=true&sealedcode=204&uninitcode=204"
      # Mount the unseal key Secret (created by the vault-config Job on first
      # init, restored by Velero on cluster rebuild) so the postStart hook
      # can auto-unseal the server after every pod restart.
      volumes:
        - name: unseal-keys
          secret:
            secretName: openbao-unseal
            optional: true
        - name: tmp
          emptyDir: {}
      volumeMounts:
        - name: unseal-keys
          mountPath: /openbao/unseal
          readOnly: true
        - name: tmp
          mountPath: /tmp
      postStart:
        - /bin/sh
        - -ec
        - |
          export BAO_ADDR="${BAO_ADDR:-http://127.0.0.1:8200}"
          sleep 5
          UNSEAL_KEY=$(cat /openbao/unseal/unseal-key 2>/dev/null || true)
          if [ -n "$UNSEAL_KEY" ] && [ "$UNSEAL_KEY" != "REPLACE_AFTER_INIT" ]; then
            until bao status -format=json 2>/dev/null | grep -q '"sealed":'; do
              sleep 2
            done
            if bao status -format=json 2>/dev/null | grep -q '"sealed": true'; then
              bao operator unseal "$UNSEAL_KEY" || true
            fi
          fi
      dataStorage:
        enabled: true
        size: ${openbao_storage_size:=1Gi}
      auditStorage:
        enabled: true
        # Chart default. The file audit backend does not rotate, and
        # OpenBao FAILS CLOSED on audit-write errors (every API request
        # blocks once the volume is full). At this cluster's request
        # volume (~700 KB/day from current ESO + vault-snapshot
        # traffic) 1Gi gives ~3-4 years of headroom, but the failure
        # mode is silent until the cluster halts -- monitor
        # 'kubelet_volume_stats_available_bytes' on the openbao-audit-*
        # PVC.
        #
        # NB: bumping this size in-place is rejected by Kubernetes
        # because spec.volumeClaimTemplates is immutable on an
        # existing StatefulSet. The supported resize path is to leave
        # the chart value alone and expand the PVC directly:
        #
        #   kubectl -n openbao patch pvc audit-openbao-0 \
        #     --type=merge -p '{"spec":{"resources":{"requests":{"storage":"10Gi"}}}}'
        #
        # CSI providers with allowVolumeExpansion: true (Hetzner CSI,
        # most cloud drivers) honour this online. Once the
        # observability stack lands, promtail will ship the stream
        # off-PVC and the size question goes away.
        size: 1Gi
      standalone:
        enabled: true
        config: |
          ui = true

          # mlock prevents secret material from being paged to swap, but
          # requires the IPC_LOCK Linux capability. On clusters where
          # IPC_LOCK is not granted (PSS 'restricted'), this would block
          # the server from starting. Disable it; we rely on
          # node-level swap-off and PSS 'baseline' on the namespace
          # instead.
          disable_mlock = true

          listener "tcp" {
            address     = "0.0.0.0:8200"
            tls_disable = 1
          }

          storage "file" {
            path = "/openbao/data"
          }

          # Declarative file audit device on the auditStorage PV. OpenBao
          # blocks runtime audit enables: `bao audit enable file …`
          # returns "cannot enable audit device via API; use declarative,
          # config-based audit device management instead", so the device
          # MUST be declared here in HCL. The mount path /openbao/audit
          # is the chart's auditStorage default. Every API request is
          # written to /openbao/audit/audit.log as one JSON record per
          # line; tail it from the openbao pod today, ship via promtail
          # once the observability stack lands.
          #
          # HCL shape (per https://openbao.org/docs/configuration/audit):
          #   audit "<arbitrary identifier>" {
          #     type    = "<device>"
          #     path    = "<api mount path>"   # what /sys/audit/<path>/ becomes
          #     options = { ... backend-specific options ... }
          #   }
          # Both `type` and `path` are required at parse time. `type`
          # selects the backend; `path` is what `bao audit list` reports
          # and what API requests address. We use "file/" so the device
          # is reachable at /sys/audit/file/.
          audit "file" {
            type    = "file"
            path    = "file/"
            options = {
              file_path = "/openbao/audit/audit.log"
            }
          }
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: openbao
              app.kubernetes.io/instance: openbao
      resources:
        requests:
          cpu: 25m
          memory: 128Mi
        limits:
          memory: 256Mi
    injector:
      enabled: false
    ui:
      enabled: true
