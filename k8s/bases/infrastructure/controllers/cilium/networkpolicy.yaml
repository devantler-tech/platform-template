---
# Allow KEDA HTTP add-on interceptor to reach Hubble UI on port 8081.
# Traffic flow: oauth2-proxy -> auth-proxy -> KEDA interceptor -> hubble-ui.
# Hubble UI lives in kube-system which has no default-deny, so this CNP is
# defense-in-depth: if/when a kube-system default-deny is introduced, the
# KEDA → hubble-ui path stays open while every other path is denied.
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-hubble-ui
  namespace: kube-system
spec:
  endpointSelector:
    matchLabels:
      k8s-app: hubble-ui
  ingress:
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: keda
            app.kubernetes.io/component: interceptor
      toPorts:
        - ports:
            - port: "8081"
              protocol: TCP
