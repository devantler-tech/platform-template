# Expose the OpenCost UI behind oauth2-proxy SSO (same forward-auth
# pattern as the monitoring UIs). OpenCost serves its UI on port 9090.
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: opencost
  namespace: opencost
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/name: OpenCost
    gethomepage.dev/description: Kubernetes cost allocation and FinOps.
    gethomepage.dev/group: Observability
    gethomepage.dev/icon: opencost.png
spec:
  parentRefs:
    - name: platform
      namespace: kube-system
      sectionName: https
  hostnames:
    - opencost.${domain}
  rules:
    - filters:
        - type: RequestHeaderModifier
          requestHeaderModifier:
            set:
              - name: X-Auth-Request-Redirect
                value: https://opencost.${domain}/
        - type: ResponseHeaderModifier
          responseHeaderModifier:
            set:
              - name: Strict-Transport-Security
                value: max-age=63072000; includeSubDomains; preload
      backendRefs:
        - name: oauth2-proxy
          namespace: oauth2-proxy
          port: 80
