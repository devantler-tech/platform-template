apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - kubevirt-operator.yaml
  - kubevirt-cr.yaml
  - networkpolicy.yaml
patches:
  # Add enforce-version label to match platform pod-security convention.
  - target:
      kind: Namespace
      name: kubevirt
    patch: |
      - op: add
        path: /metadata/labels/pod-security.kubernetes.io~1enforce-version
        value: latest
