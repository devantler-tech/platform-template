apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: dex
  namespace: dex
  labels:
    helm.toolkit.fluxcd.io/crds: enabled
    helm.toolkit.fluxcd.io/helm-test: enabled
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 2m
  timeout: 10m
  install:
    remediation:
      retries: -1
  upgrade:
    remediation:
      retries: -1
      remediateLastFailure: true
  chart:
    spec:
      chart: dex
      version: 0.24.0
      sourceRef:
        kind: HelmRepository
        name: dex
  # https://github.com/dexidp/helm-charts/blob/master/charts/dex/values.yaml
  values:
    replicaCount: ${dex_replicas:=2}
    podSecurityContext:
      runAsUser: 65534
      runAsGroup: 65534
    securityContext:
      runAsUser: 65534
    podDisruptionBudget:
      enabled: true
      minAvailable: 1
    topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: dex
            app.kubernetes.io/instance: dex
    # Dex writes a temporary copy of its config at startup. The
    # add-security-context policy enforces readOnlyRootFilesystem, so
    # /tmp must be an emptyDir to avoid EPERM.
    volumes:
      - name: tmp
        emptyDir: {}
    volumeMounts:
      - name: tmp
        mountPath: /tmp
    ingress:
      enabled: false
    envVars:
      - name: CLIENT_ID
        value: ${github_app_client_id}
      - name: CLIENT_SECRET
        value: ${github_app_client_secret}
    config:
      issuer: https://dex.${domain}
      oauth2:
        skipApprovalScreen: true
      storage:
        type: kubernetes
        config:
          inCluster: true
      staticClients:
        - name: Public Client
          id: public-client
          secret: ${dex_client_secret}
          redirectURIs:
            - "https://oauth2-proxy.${domain}/oauth2/callback"
            - "https://headlamp.${domain}/oidc-callback"
            - "https://budget.${domain}/oidc/callback"
            - "https://vault.${domain}/ui/vault/auth/oidc/oidc/callback"
            - "https://grafana.${domain}/login/generic_oauth"
          trustedPeers:
            - kubectl
        - name: kubectl
          id: kubectl
          public: true
          redirectURIs:
            - "http://localhost:8000"
        - name: Flux Web
          id: flux-web
          secret: ${flux_web_client_secret}
          redirectURIs:
            - "https://flux.${domain}/oauth2/callback"
      connectors:
        - type: github
          id: github
          name: GitHub
          config:
            clientID: $CLIENT_ID
            clientSecret: $CLIENT_SECRET
            redirectURI: https://dex.${domain}/callback
            # CLIENT_ID/CLIENT_SECRET come from envVars (Flux substitution).
            # Dex resolves $VAR references from process env at runtime.
            teamNameField: slug
            useLoginAsID: false
            orgs:
              - name: example-org
