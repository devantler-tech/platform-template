apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
  namespace: monitoring
  labels:
    helm.toolkit.fluxcd.io/crds: enabled
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  interval: 5m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 85.3.3
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
  install:
    crds: CreateReplace
    remediation:
      retries: -1
  upgrade:
    crds: CreateReplace
    remediation:
      retries: -1
      remediateLastFailure: true
  timeout: 15m
  # https://github.com/prometheus-community/helm-charts/blob/main/charts/kube-prometheus-stack/values.yaml
  #
  # Prometheus + Alertmanager + node-exporter + kube-state-metrics +
  # Grafana. Production-ready posture (see docs/dr/alerting.md):
  #   - Alerts ship to Slack via native slack_configs.
  #   - An always-firing Watchdog is pushed to an external heartbeat
  #     monitor (dead-man's-switch) so a full-cluster outage still pages.
  #   - Prometheus & Alertmanager get persistent volumes in the hetzner
  #     overlay; Velero backs the monitoring namespace up to R2 daily.
  #   - Grafana is exposed behind oauth2-proxy SSO with Prometheus + Loki
  #     datasources for dashboards and log exploration.
  values:
    crds:
      enabled: true

    # Grafana authenticates users directly against Dex via native OIDC
    # (auth.generic_oauth) -- it is NOT fronted by oauth2-proxy (its
    # HTTPRoute backends straight to the Grafana Service). Every user who
    # clears the Dex gate is mapped to Admin (single-operator homelab) via
    # the JMESPath literal in role_attribute_path. auto_login +
    # disable_login_form send users straight to Dex with no Grafana login
    # form (break-glass: https://grafana.${domain}/login?disableAutoLogin=true).
    # Loki is wired in as an additional datasource below.
    grafana:
      enabled: true
      grafana.ini:
        server:
          root_url: https://grafana.${domain}
        auth:
          disable_login_form: true
        auth.basic:
          enabled: false
        auth.generic_oauth:
          enabled: true
          name: Dex
          auto_login: true
          client_id: public-client
          scopes: openid profile email groups
          # Split the OIDC endpoints so this works on every cluster (mirrors
          # oauth2-proxy): the browser-facing authorize endpoint stays the
          # public Dex URL (the browser resolves dex.${domain} via the host
          # /etc/hosts locally, public DNS in prod), while the server-side
          # token + userinfo calls use the in-cluster Dex Service the Grafana
          # pod can always resolve. dex.${domain} does NOT resolve via
          # in-cluster CoreDNS on the docker/local cluster, so targeting the
          # public URL here fails the back-channel token exchange with
          # "Failed to get token from provider". The dex NetworkPolicy allows
          # the matching monitoring->5556 ingress.
          auth_url: https://dex.${domain}/auth
          token_url: http://dex.dex.svc.cluster.local:5556/token
          api_url: http://dex.dex.svc.cluster.local:5556/userinfo
          # JMESPath string literal -> every authenticated user gets Admin.
          role_attribute_path: "'Admin'"
      # Client secret (Dex 'public-client') from the grafana-oidc
      # ExternalSecret. GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET overrides the
      # grafana.ini value. optional:true so a bootstrap race fails login
      # closed instead of crash-looping the pod; reloader restarts Grafana
      # when ESO lands the secret.
      envValueFrom:
        GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
          secretKeyRef:
            name: grafana-oidc
            key: client-secret
            optional: true
      annotations:
        secret.reloader.stakater.com/reload: grafana-oidc
      # Dashboards are provisioned as code, so the pod can stay ephemeral.
      persistence:
        enabled: false
      defaultDashboardsEnabled: true
      sidecar:
        dashboards:
          enabled: true
          searchNamespace: ALL
        datasources:
          enabled: true
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 256Mi
      # Loki log datasource (Loki shares the monitoring namespace).
      additionalDataSources:
        - name: Loki
          type: loki
          access: proxy
          url: http://loki.monitoring.svc.cluster.local:3100
          jsonData:
            maxLines: 1000

    # We don't host an external Prometheus and don't expose this one.
    prometheus:
      prometheusSpec:
        replicas: 1
        # Monitoring is critical platform infrastructure — keep it alive under
        # node memory pressure (evicted only after normal workloads). See the
        # platform-critical PriorityClass.
        priorityClassName: platform-critical
        retention: 14d
        retentionSize: "5GiB"
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            memory: 768Mi
        # Discover ServiceMonitors / PodMonitors / PrometheusRules from
        # any namespace -- charts in this repo (Velero, CNPG, etc.) drop
        # their own.
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        scrapeConfigSelectorNilUsesHelmValues: false
        # Discover targets through EndpointSlices rather than the default
        # core/v1 Endpoints API. ServiceMonitor discovery inherently lists
        # *every* endpoint in a monitor's target namespace and keeps only the
        # matching Service, dropping the rest -- so a large "dropped" count on
        # Prometheus' Service Discovery page is expected, not a fault (each of
        # the ~14 monitors in this namespace scans ~50 endpoints). EndpointSlice
        # is the scalable, operator-recommended SD role: it trims the apiserver
        # watch + relabel churn behind those drops and future-proofs against the
        # core/v1 Endpoints deprecation (k8s 1.33). It does not (and need not)
        # lower the dropped count -- that is just how ServiceMonitors select.
        serviceDiscoveryRole: EndpointSlice
        # External labels so the webhook payload identifies the source
        # cluster.
        externalLabels:
          domain: ${domain}
        # No persistence -- 14d/5GiB fits in memory + emptyDir for a
        # homelab. PR #4 already backs up persistent state separately;
        # losing the metrics history on a restart is acceptable.
        storageSpec: {}

    alertmanager:
      alertmanagerSpec:
        replicas: ${alertmanager_replicas:=2}
        # Alerting must survive memory pressure (it is how a degrading node is
        # noticed in the first place).
        priorityClassName: platform-critical
        podDisruptionBudget:
          enabled: true
          minAvailable: 1
        topologySpreadConstraints:
          - maxSkew: 1
            topologyKey: kubernetes.io/hostname
            whenUnsatisfiable: ScheduleAnyway
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: alertmanager
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            memory: 128Mi
        externalUrl: ""
      config:
        global:
          resolve_timeout: 5m
        route:
          # Group on the labels Prometheus actually sets externally
          # (externalLabels.domain = ${domain}) -- `cluster` is not a
          # configured label here, so grouping by it would dedup nothing.
          group_by: ["alertname", "domain", "severity"]
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 12h
          receiver: slack
          routes:
            # Dead-man's-switch. The Watchdog alert always fires (from the
            # chart's general rules), so we push it to an external heartbeat
            # monitor (e.g. healthchecks.io) on a tight cadence. If the
            # cluster or the Prometheus->Alertmanager pipeline dies, the
            # monitor stops receiving pings and notifies Slack out-of-band
            # -- the one failure in-cluster alerting can never cover itself.
            - matchers:
                - alertname = "Watchdog"
              receiver: heartbeat
              # Alertmanager re-notifies only when both group_interval AND
              # repeat_interval have elapsed since the last send. Keeping
              # group_interval (30s) below repeat_interval (50s) lets the
              # 50s cadence actually take effect; with group_interval >=
              # repeat_interval the heartbeat would be silently throttled
              # to the longer of the two.
              group_wait: 0s
              group_interval: 30s
              repeat_interval: 50s
              continue: false
            - matchers:
                - severity = "critical"
              receiver: slack
              continue: false
            - matchers:
                - severity = "warning"
              receiver: slack
              repeat_interval: 24h
        receivers:
          # Normal alerts -> Slack via a native incoming webhook. The URL
          # is per-cluster and SOPS-encrypted (alertmanager_webhook_url),
          # so local clusters get an invalid URL and stay quiet by design.
          - name: slack
            slack_configs:
              - api_url_file: /etc/alertmanager/secrets/alertmanager-webhook/webhook_url
                channel: "#platform-alerts"
                send_resolved: true
                title: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}'
                text: >-
                  {{ range .Alerts }}*{{ .Labels.severity | toUpper }}* — {{ .Annotations.summary }}
                  {{ .Annotations.description }}
                  {{ end }}
          # Heartbeat receiver: just POSTs to the external monitor URL. No
          # resolved notifications -- a missing ping is the signal. The URL
          # is injected by Flux substitution from the per-cluster secret;
          # if unset (local/CI) it defaults to an invalid URL so the
          # heartbeat simply never reaches anywhere -- harmless, and the
          # same "fail closed locally" pattern as the Slack webhook.
          - name: heartbeat
            webhook_configs:
              - url: ${alertmanager_heartbeat_url:=https://example.invalid/no-heartbeat-configured}
                send_resolved: false
        inhibit_rules:
          # Equal labels must exist on both source and target alerts;
          # `cluster` isn't configured here (we set `domain` via
          # externalLabels), so use that for the cluster-scoped match.
          - source_matchers: [severity = "critical"]
            target_matchers: [severity = "warning"]
            equal: [alertname, domain, namespace]
      secrets:
        - alertmanager-webhook

    # Don't try to scrape the API server / kubelet / etcd through the
    # default ServiceMonitors here -- Talos exposes some of these
    # differently and we don't need k8s-internal histograms for alerting.
    # Targeted alerts in PrometheusRule cover what we actually care about.
    kubeApiServer:
      enabled: false
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeProxy:
      enabled: false
    kubeEtcd:
      enabled: false
    kubelet:
      enabled: true

    nodeExporter:
      enabled: true
    # node-exporter subchart passthrough (alias `prometheus-node-exporter`).
    prometheus-node-exporter:
      priorityClassName: platform-critical
    kube-state-metrics:
      enabled: true
      priorityClassName: platform-critical

    # Enable the chart's well-tested default rules, but prune the groups
    # for control-plane components we deliberately don't scrape (their
    # ServiceMonitors are disabled above, so their alerts would only fire
    # on permanently-absent targets). This gives us:
    #   - Watchdog (general.rules) -> the dead-man's-switch heartbeat.
    #   - Self-monitoring: PrometheusOperator/Prometheus/Alertmanager down,
    #     config-reload failures, TSDB problems.
    #   - Workload health: KubePodCrashLooping, KubeDeploymentReplicasMismatch,
    #     KubeContainerWaiting, KubePersistentVolume* etc.
    # Platform-specific alerts (Velero/CNPG/Flux/cert-manager/autoscaler)
    # live in k8s/bases/infrastructure/alerts/platform-critical.yaml.
    defaultRules:
      create: true
      rules:
        etcd: false
        kubeApiserverAvailability: false
        kubeApiserverBurnrate: false
        kubeApiserverHistogram: false
        kubeApiserverSlos: false
        kubeControllerManager: false
        kubeProxy: false
        kubeSchedulerAlerting: false
        kubeSchedulerRecording: false
        windows: false
      # Overcommit alerts are guaranteed noise on a cluster that runs hot
      # on purpose (VPA right-sizes requests; the autoscaler adds nodes).
      disabled:
        KubeCPUOvercommit: true
        KubeMemoryOvercommit: true

    prometheusOperator:
      priorityClassName: platform-critical
      resources:
        requests:
          cpu: 50m
          memory: 128Mi
        limits:
          memory: 256Mi
