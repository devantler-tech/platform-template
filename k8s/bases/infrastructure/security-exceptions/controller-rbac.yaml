---
# Exempt controllers and middleware that legitimately need broad RBAC.
# Infrastructure controllers (Flux, Kyverno, cert-manager, CNPG, Velero,
# KEDA, monitoring, KubeVirt, CDI, Longhorn) and platform middleware
# (headlamp cluster dashboard, homepage service discovery, dex identity,
# oauth2-proxy auth, opencost cost monitoring, reloader config watcher)
# all require cluster-wide read or read/write access to function correctly.
apiVersion: kubescape.io/v1beta1
kind: ClusterSecurityException
metadata:
  name: controller-rbac
spec:
  reason: >-
    Infrastructure controllers and platform middleware require broad RBAC
    to manage their target resources cluster-wide. This includes GitOps
    (Flux), policy engines (Kyverno), certificate managers (cert-manager),
    database operators (CNPG), backup controllers (Velero), autoscalers
    (KEDA), monitoring (Prometheus/opencost), virtualisation (KubeVirt,
    CDI), storage (Longhorn), cluster dashboards (headlamp), service
    discovery (homepage), identity (dex), auth proxies (oauth2-proxy),
    and config watchers (reloader).
  posture:
    - controlID: C-0053
      action: ignore
    - controlID: C-0015
      action: ignore
    - controlID: C-0007
      action: ignore
    - controlID: C-0037
      action: ignore
    - controlID: C-0031
      action: ignore
    - controlID: C-0002
      action: ignore
    - controlID: C-0063
      action: ignore
    - controlID: C-0035
      action: ignore
    - controlID: C-0187
      action: ignore
    - controlID: C-0188
      action: ignore
  match:
    namespaceSelector:
      matchExpressions:
        - key: kubernetes.io/metadata.name
          operator: In
          values:
            - flux-system
            - kyverno
            - cert-manager
            - cnpg-system
            - velero
            - keda
            - monitoring
            - kubescape
            - vertical-pod-autoscaler
            - kubevirt
            - cdi
            - longhorn-system
            - external-dns
            - oauth2-proxy
            - headlamp
            - kubelet-serving-cert-approver
            - opencost
            - reloader
            - dex
            - homepage
