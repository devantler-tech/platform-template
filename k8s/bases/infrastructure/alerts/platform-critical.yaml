apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: platform-critical
  namespace: monitoring
  labels:
    prometheus: kube-prometheus
    role: alert-rules
spec:
  groups:
    - name: nodes
      rules:
        - alert: NodeNotReady
          expr: kube_node_status_condition{condition="Ready",status="true"} == 0
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "Node {{ $labels.node }} not Ready"
            description: "Node {{ $labels.node }} has been NotReady for more than 10 minutes."

        - alert: NodeDiskFillingUp
          expr: |
            (1 - (node_filesystem_avail_bytes{fstype!~"tmpfs|squashfs"}
                  / node_filesystem_size_bytes{fstype!~"tmpfs|squashfs"})) * 100 > 90
          for: 30m
          labels:
            severity: warning
          annotations:
            summary: "Node {{ $labels.instance }} disk >90 % full"
            description: "Filesystem {{ $labels.mountpoint }} is {{ $value | humanize }}% full."

    - name: storage
      rules:
        - alert: PersistentVolumeFillingUp
          expr: |
            (kubelet_volume_stats_used_bytes
             / kubelet_volume_stats_capacity_bytes) * 100 > 90
          for: 30m
          labels:
            severity: critical
          annotations:
            summary: "PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} >90 % full"
            description: "PV {{ $labels.persistentvolumeclaim }} usage at {{ $value | humanize }}%."

    - name: certificates
      rules:
        - alert: CertificateExpiringSoon
          expr: |
            (certmanager_certificate_expiration_timestamp_seconds - time()) / 86400 < 14
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "Certificate {{ $labels.namespace }}/{{ $labels.name }} expires in <14d"
            description: "Renewal hasn't happened. cert-manager logs: kubectl logs -n cert-manager -l app=cert-manager"

    - name: flux
      rules:
        - alert: FluxKustomizationNotReady
          expr: |
            gotk_reconcile_condition{type="Ready",status="False",
                                     kind=~"Kustomization|HelmRelease"} == 1
          for: 15m
          labels:
            severity: critical
          annotations:
            summary: "Flux {{ $labels.kind }} {{ $labels.namespace }}/{{ $labels.name }} not Ready"
            description: "kubectl describe {{ $labels.kind }} -n {{ $labels.namespace }} {{ $labels.name }}"

    - name: backups
      rules:
        - alert: VeleroBackupFailed
          expr: increase(velero_backup_failure_total[1h]) > 0
          labels:
            severity: critical
          annotations:
            summary: "Velero backup failure(s) in the last hour"
            description: "{{ $value }} Velero backup(s) failed. kubectl -n velero get backups | grep -v Completed"

        - alert: VeleroNoRecentBackup
          expr: |
            time() - max(velero_backup_last_successful_timestamp) > 60 * 60 * 30
          labels:
            severity: critical
          annotations:
            summary: "No successful Velero backup in >30h"
            description: "RPO breached. Latest backup is older than 30h; daily schedule should run every 24h."

        - alert: CNPGNoRecentBackup
          expr: |
            time() - cnpg_collector_last_failed_backup_timestamp == 0
            unless on(cluster)
            time() - cnpg_collector_last_available_backup_timestamp < 60 * 60 * 30
          labels:
            severity: critical
          annotations:
            summary: "CNPG cluster {{ $labels.cluster }} has no successful backup in >30h"
            description: "kubectl cnpg status {{ $labels.cluster }}"

        - alert: CNPGClusterDegraded
          expr: cnpg_pg_replication_in_recovery == 0 and on(namespace, cluster) cnpg_pg_replication_streaming_replicas < 1
          for: 15m
          labels:
            severity: critical
          annotations:
            summary: "CNPG cluster {{ $labels.cluster }} has no streaming replica"
            description: "Single instance left -- a primary failure would lose data up to the last WAL archive."

    - name: resource-pressure
      rules:
        - alert: ClusterCPUUtilizationHigh
          expr: |
            (1 - avg(rate(node_cpu_seconds_total{mode="idle"}[5m]))) * 100 > 80
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Cluster-wide CPU utilization >80 %"
            description: "Average CPU across all nodes is {{ $value | humanize }}%. Cluster Autoscaler should add capacity; check for stuck scale-up."

        - alert: ClusterMemoryUtilizationHigh
          expr: |
            (1 - sum(node_memory_MemAvailable_bytes) / sum(node_memory_MemTotal_bytes)) * 100 > 85
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: "Cluster-wide memory utilization >85 %"
            description: "Aggregate memory usage is {{ $value | humanize }}%. Verify Cluster Autoscaler is scaling and VPA is adjusting pod requests."

        - alert: PodsFailedScheduling
          expr: |
            increase(scheduler_pending_pods{queue="unschedulable"}[10m]) > 0
            or count(kube_pod_status_phase{phase="Pending"} == 1) > 3
          for: 10m
          labels:
            severity: critical
          annotations:
            summary: "Pods stuck in Pending for >10 m"
            description: "Pods cannot be scheduled — likely insufficient node resources. kubectl get pods -A --field-selector=status.phase=Pending"

        - alert: ClusterAutoscalerScaleUpFailed
          expr: |
            increase(cluster_autoscaler_failed_scale_ups_total[15m]) > 0
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Cluster Autoscaler failed to scale up"
            description: "{{ $value }} scale-up attempts failed. Check autoscaler logs: kubectl -n kube-system logs -l app.kubernetes.io/name=cluster-autoscaler --tail=100"

        - alert: ClusterAutoscalerUnneededNodes
          expr: |
            cluster_autoscaler_unneeded_nodes_count > 0
          for: 30m
          labels:
            severity: info
          annotations:
            summary: "{{ $value }} node(s) underutilized for >30 m"
            description: "Autoscaler should scale down soon. If cost is a concern, verify scale-down-unneeded-time."
