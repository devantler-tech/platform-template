apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-vault-snapshot
  namespace: openbao
spec:
  endpointSelector:
    matchLabels:
      app: vault-snapshot
  egress:
    # OpenBao API for health check and Kubernetes auth login
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: openbao
            app.kubernetes.io/name: openbao
      toPorts:
        - ports:
            - port: "8200"
              protocol: TCP
    # Kube API for ServiceAccount token authentication
    - toEntities:
        - kube-apiserver
    # DNS resolution
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
