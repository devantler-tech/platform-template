apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: vault-config-oidc
  namespace: openbao
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: vault-config-oidc
    creationPolicy: Owner
  data:
    - secretKey: dex-client-secret
      remoteRef:
        key: infrastructure/oidc/dex
        property: client-secret
