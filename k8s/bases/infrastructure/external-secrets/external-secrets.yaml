# ExternalSecret CRs that replace standalone SOPS-substituted Secret files.
# Each creates a native K8s Secret in the target namespace from OpenBao.
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: velero-r2-credentials
  namespace: velero
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: velero-r2-credentials
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        cloud: |
          [default]
          aws_access_key_id={{ .access_key_id }}
          aws_secret_access_key={{ .secret_access_key }}
  data:
    - secretKey: access_key_id
      remoteRef:
        key: infrastructure/backup/r2
        property: access_key_id
    - secretKey: secret_access_key
      remoteRef:
        key: infrastructure/backup/r2
        property: secret_access_key
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cnpg-r2-credentials
  namespace: cnpg-system
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: cnpg-r2-credentials
    creationPolicy: Owner
  data:
    - secretKey: ACCESS_KEY_ID
      remoteRef:
        key: infrastructure/backup/r2
        property: access_key_id
    - secretKey: SECRET_ACCESS_KEY
      remoteRef:
        key: infrastructure/backup/r2
        property: secret_access_key
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: alertmanager-webhook
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: alertmanager-webhook
    creationPolicy: Owner
  data:
    # Slack incoming-webhook URL for normal alert notifications. The
    # Watchdog heartbeat URL is injected via Flux substitution
    # (${alertmanager_heartbeat_url}) rather than here, so an unset value
    # degrades to an invalid URL instead of failing this ExternalSecret.
    - secretKey: webhook_url
      remoteRef:
        key: infrastructure/monitoring/alertmanager
        property: webhook_url
---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-oidc
  namespace: monitoring
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: openbao
    kind: ClusterSecretStore
  target:
    name: grafana-oidc
    creationPolicy: Owner
  data:
    # Dex 'public-client' secret. Grafana does native OIDC against Dex
    # (auth.generic_oauth); this is the same shared confidential-client
    # secret Headlamp/oauth2-proxy use.
    - secretKey: client-secret
      remoteRef:
        key: infrastructure/oidc/dex
        property: client-secret
