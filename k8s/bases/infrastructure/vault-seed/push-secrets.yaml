# PushSecrets seed OpenBao from SOPS-decrypted K8s Secrets.
# These push externally-sourced credentials that cannot be randomly generated.
# Randomly-generatable secrets are handled by push-generated-secrets.yaml.
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: seed-r2-credentials
  namespace: flux-system
spec:
  refreshInterval: "0"
  secretStoreRefs:
    - name: openbao
      kind: ClusterSecretStore
  selector:
    secret:
      name: variables-base
  data:
    - match:
        secretKey: r2_access_key_id
        remoteRef:
          remoteKey: infrastructure/backup/r2
          property: access_key_id
    - match:
        secretKey: r2_secret_access_key
        remoteRef:
          remoteKey: infrastructure/backup/r2
          property: secret_access_key
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: seed-cloudflare
  namespace: flux-system
spec:
  refreshInterval: "0"
  secretStoreRefs:
    - name: openbao
      kind: ClusterSecretStore
  selector:
    secret:
      name: variables-base
  data:
    - match:
        secretKey: cloudflare_api_token
        remoteRef:
          remoteKey: infrastructure/dns/cloudflare
          property: api_token
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: seed-alertmanager
  namespace: flux-system
spec:
  refreshInterval: "0"
  secretStoreRefs:
    - name: openbao
      kind: ClusterSecretStore
  selector:
    secret:
      name: variables-cluster
  data:
    - match:
        secretKey: alertmanager_webhook_url
        remoteRef:
          remoteKey: infrastructure/monitoring/alertmanager
          property: webhook_url
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: seed-github-app
  namespace: flux-system
spec:
  refreshInterval: "0"
  secretStoreRefs:
    - name: openbao
      kind: ClusterSecretStore
  selector:
    secret:
      name: variables-cluster
  data:
    - match:
        secretKey: github_app_client_secret
        remoteRef:
          remoteKey: infrastructure/oidc/github
          property: client-secret
---
# Velero kopia repository password
# ---------------------------------
# Velero auto-generates a random password in the `velero-repo-credentials`
# Secret on first start, then uses it to encrypt every kopia repository
# (= every R2-stored backup). Lose that password and the backups become
# unrecoverable -- even if the R2 bucket is intact.
#
# This PushSecret one-way mirrors the password to OpenBao at
# infrastructure/backup/velero-repo so it survives a cluster rebuild.
# OpenBao durability today comes from Velero snapshotting the openbao
# namespace (including its PVC) to R2 on the daily schedule -- the
# password lands in the off-cluster backup alongside every other
# OpenBao Secret. The vault-snapshot CronJob in this repo only verifies
# OpenBao's seal status; it does not itself upload to R2.
# Recovery procedure documented in docs/dr/crypto-custody.md.
#
# refreshInterval "0" means push once; if the in-cluster Secret is ever
# rotated (manual ops), the PushSecret can be re-applied to update
# OpenBao.
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: seed-velero-repo-credentials
  namespace: velero
spec:
  refreshInterval: "0"
  secretStoreRefs:
    - name: openbao
      kind: ClusterSecretStore
  selector:
    secret:
      name: velero-repo-credentials
  data:
    - match:
        secretKey: repository-password
        remoteRef:
          remoteKey: infrastructure/backup/velero-repo
          property: repository-password
