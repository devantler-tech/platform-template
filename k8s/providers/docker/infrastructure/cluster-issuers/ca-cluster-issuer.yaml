# CA ClusterIssuer backed by an auto-generated self-signed CA.
# cert-manager creates the CA key pair via the Certificate resource in
# ca-certificate.yaml (issued by the bootstrap selfsigned ClusterIssuer).
# The resulting Secret (platform-ca-key-pair) is referenced here.
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: platform-ca
spec:
  ca:
    secretName: platform-ca-key-pair
