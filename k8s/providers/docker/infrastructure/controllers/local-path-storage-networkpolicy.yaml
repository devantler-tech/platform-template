apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: allow-local-path
  namespace: local-path-storage
spec:
  endpointSelector: {}
  egress:
    # Kube API for watching PVCs, PVs, and StorageClasses
    - toEntities:
        - kube-apiserver
    # DNS resolution
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
