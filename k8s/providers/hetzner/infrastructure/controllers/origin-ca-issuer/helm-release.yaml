apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: origin-ca-issuer
  namespace: cert-manager
spec:
  dependsOn:
    - name: cert-manager
  interval: 2m
  timeout: 10m
  install:
    remediation:
      retries: -1
  upgrade:
    remediation:
      retries: -1
      remediateLastFailure: true
  chart:
    spec:
      chart: origin-ca-issuer
      version: 0.6.4
      sourceRef:
        kind: HelmRepository
        name: origin-ca-issuer
  # https://github.com/cloudflare/origin-ca-issuer/blob/trunk/deploy/charts/origin-ca-issuer/values.yaml
  values:
    replicaCount: ${origin_ca_issuer_replicas:=2}
  # Chart hardcodes 1 CPU / 512Mi without templating; override via
  # postRenderers since values.resources is not wired in the chart.
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Deployment
              name: origin-ca-issuer
            patch: |
              apiVersion: apps/v1
              kind: Deployment
              metadata:
                name: origin-ca-issuer
              spec:
                template:
                  spec:
                    containers:
                      - name: origin-ca-issuer
                        resources:
                          requests:
                            cpu: 10m
                            memory: 64Mi
                          limits:
                            memory: 128Mi
