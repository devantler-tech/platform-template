---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: hcloud-csi
  namespace: kube-system
  labels:
    helm.toolkit.fluxcd.io/helm-test: enabled
    helm.toolkit.fluxcd.io/remediation: enabled
spec:
  chart:
    spec:
      chart: hcloud-csi
      version: 2.21.1
      sourceRef:
        kind: HelmRepository
        name: hcloud
  interval: 10m0s
  timeout: 10m
  install:
    remediation:
      retries: -1
  upgrade:
    remediation:
      retries: -1
      remediateLastFailure: true
  # https://github.com/hetznercloud/csi-driver/blob/main/chart/values.yaml
  values:
    global:
      # enableProvidedByTopology adds an allowedTopologies constraint to the
      # StorageClass that conflicts with the CSI provisioner's topology
      # matching when volumeBindingMode is WaitForFirstConsumer.  Disabling
      # it avoids "topology not in requisite" provisioning failures.
      enableProvidedByTopology: false
    controller:
      # Provisioning/attach control plane. The chart leaves priorityClassName
      # unset by default (priority 0), which makes it a first candidate for
      # node-pressure eviction. system-cluster-critical ranks it among the last
      # eviction candidates so volume operations keep working under pressure.
      priorityClassName: system-cluster-critical
      replicaCount: ${hcloud_csi_controller_replicas:=2}
      hcloudVolumeDefaultLocation: fsn1
      podDisruptionBudget:
        create: true
        minAvailable: 1
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/component: controller
                    app.kubernetes.io/name: hcloud-csi
                    app.kubernetes.io/instance: hcloud-csi
    node:
      # Per-node volume mount/unmount plumbing — node-critical. The chart
      # leaves priorityClassName unset by default (priority 0); system-node-critical
      # ranks the DaemonSet among the last eviction candidates so stateful pods
      # can keep mounting their storage under node memory pressure.
      priorityClassName: system-node-critical
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: "instance.hetzner.cloud/is-root-server"
                    operator: NotIn
                    values:
                      - "true"
                  - key: "instance.hetzner.cloud/provided-by"
                    operator: Exists
                  - key: "instance.hetzner.cloud/provided-by"
                    operator: NotIn
                    values:
                      - "robot"
    storageClasses:
      - name: hcloud
        defaultStorageClass: false
        reclaimPolicy: Delete
