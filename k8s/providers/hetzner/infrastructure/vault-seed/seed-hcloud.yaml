# PushSecret for the Hetzner Cloud API token. Only present on the Hetzner
# provider overlay because the source key (hcloud_token in variables-cluster)
# is only populated for prod; on local Docker clusters there is no hcloud
# integration and this PushSecret would stall in InProgress.
---
apiVersion: external-secrets.io/v1alpha1
kind: PushSecret
metadata:
  name: seed-hcloud
  namespace: flux-system
spec:
  refreshInterval: "0"
  secretStoreRefs:
    - name: openbao
      kind: ClusterSecretStore
  selector:
    secret:
      name: variables-cluster
  data:
    - match:
        secretKey: hcloud_token
        remoteRef:
          remoteKey: infrastructure/hcloud/token
          property: token
