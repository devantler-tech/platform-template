name: 🧱 Validate Scaffold

on:
  pull_request:
    branches: [main]

permissions: {}

# Template-repo-only scaffold-integrity gate. The k8s/ Kustomize tree + ksail
# configs are this template's core deliverable — every new instance inherits them
# — so a PR that breaks the scaffold (a renamed/removed resource, a YAML error, a
# bad ${VAR} substitution) must not merge green and ship broken manifests
# downstream. This job runs ONLY in the template repo; it no-ops in instances
# created from it (the guard below is false there), mirroring how cd.yaml /
# release.yaml run only in instances. Instances validate their live cluster via
# ci.yaml's ephemeral system-test instead (which needs secrets the template lacks).
#
# It is intentionally simpler than the tenant template's kubeconform job: ksail's
# own `workload validate` already runs kustomize-build + kubeconform schema
# validation + Flux ${VAR} substitution in one step, so re-implementing those here
# would only duplicate ksail's gate. Both the local (ksail.yaml) and prod
# (ksail.prod.yaml) configs are validated; the prod config references a GHCR
# registry field that expands a ${GHCR_TOKEN} env, so a dummy value is supplied
# purely so the expansion succeeds during validation (nothing is pushed).
jobs:
  validate-scaffold:
    name: Validate Scaffold
    if: github.repository == 'devantler-tech/platform-template'
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout
    steps:
      - name: 🛡️ Harden runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: 📑 Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false # read-only job; never pushes, so don't keep the token

      - name: ⚙️ Setup KSail
        # Install the KSail CLI from the release tarball via curl — the same
        # method as cd.yaml so the validate gate and the deploy path can never
        # validate against different ksail versions. Renovate keeps this pin
        # current via the custom regex manager in .github/renovate.json.
        env:
          # renovate: datasource=github-releases depName=devantler-tech/ksail extractVersion=^v(?<version>.+)$
          KSAIL_VERSION: "7.23.4"
        run: |
          curl -fsSL "https://github.com/devantler-tech/ksail/releases/download/v${KSAIL_VERSION}/ksail_${KSAIL_VERSION}_linux_amd64.tar.gz" -o /tmp/ksail.tar.gz
          tar -xzf /tmp/ksail.tar.gz -C /tmp
          sudo install /tmp/ksail /usr/local/bin/ksail
          ksail --version

      - name: ✅ Validate local manifests
        # ksail workload validate = kustomize build + kubeconform + Flux ${VAR}
        # substitution. A broken kustomization, an invalid resource, or an
        # unresolved variable fails here before it can ship to an instance.
        run: ksail --config ksail.yaml workload validate

      - name: ✅ Validate prod manifests
        # ksail.prod.yaml's localRegistry field embeds ${GHCR_TOKEN}; supply a
        # dummy value so the field expands during validation. Nothing is pushed —
        # this only renders + schema-validates the prod cluster's manifests.
        env:
          GHCR_TOKEN: placeholder
        run: ksail --config ksail.prod.yaml workload validate
