name: 🔄 Template Sync

on:
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC
  workflow_dispatch:

permissions: {}

jobs:
  template-sync:
    # Skipped in the template repo itself (it is the sync source); runs in every
    # instance created from this template, where it opens a PR with template changes.
    if: github.repository != 'devantler-tech/platform-template'
    # The reusable workflow's job opens the sync PR, so the caller must grant it
    # write to contents + pull-requests. A reusable workflow cannot be granted
    # more than the caller, and the top-level `permissions: {}` grants none, so
    # without this the run fails at startup (reusable-workflow permission check)
    # — both here and in every instance where the job actually runs.
    permissions:
      contents: write
      pull-requests: write
    uses: devantler-tech/reusable-workflows/.github/workflows/template-sync.yaml@f974f62a8cb396130fa084d209ad1fc17e99b9fc # v5.6.1
    with:
      source-repo-path: devantler-tech/platform-template
    secrets:
      APP_PRIVATE_KEY: ${{ secrets.APP_PRIVATE_KEY }}
